<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CoachAndTrack</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --dark:#0D0D14;--card:#13131E;--elevated:#1A1A2E;--border:#2A2A3E;--orange:#F97316;--green:#22C55E;--text:#F3F4F6;--muted:#94A3B8;--dim:#64748B;--red:#EF4444; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(249,115,22,0.08),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(249,115,22,0.04),transparent);pointer-events:none;}
    .auth-wrap{width:100%;max-width:420px;position:relative;z-index:1;}
    .auth-logo{text-align:center;margin-bottom:2rem;}
    .auth-logo a{display:inline-flex;align-items:center;gap:0.6rem;text-decoration:none;}
    .logo-icon{width:40px;height:40px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:white;}
    .logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;color:var(--text);}
    .logo-text span{color:var(--orange);}
    .auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
    .auth-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:0.4rem;line-height:1;}
    .auth-title span{color:var(--orange);}
    .auth-sub{font-size:0.88rem;color:var(--muted);margin-bottom:2rem;line-height:1.6;}
    .form-group{margin-bottom:1.2rem;}
    .form-label{display:block;font-size:0.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;}
    .form-input{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;transition:border-color 0.2s;outline:none;}
    .form-input:focus{border-color:var(--orange);}
    .form-input::placeholder{color:var(--dim);}
    .form-forgot{text-align:right;margin-top:0.4rem;}
    .form-forgot a{font-size:0.78rem;color:var(--dim);text-decoration:none;transition:color 0.2s;}
    .form-forgot a:hover{color:var(--orange);}
    .error-msg{display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;color:#FCA5A5;margin-bottom:1.2rem;}
    .error-msg.show{display:block;}
    .success-msg{display:none;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;color:#86EFAC;margin-bottom:1.2rem;}
    .success-msg.show{display:block;}
    .btn-submit{width:100%;background:var(--orange);color:white;border:none;border-radius:10px;padding:0.95rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-bottom:1.5rem;}
    .btn-submit:hover{opacity:0.9;}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
    .divider{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;color:var(--dim);font-size:0.8rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .auth-footer{text-align:center;font-size:0.88rem;color:var(--muted);}
    .auth-footer a{color:var(--orange);text-decoration:none;font-weight:600;}
    .back-home{text-align:center;margin-top:1.5rem;}
    .back-home a{font-size:0.82rem;color:var(--dim);text-decoration:none;transition:color 0.2s;}
    .back-home a:hover{color:var(--orange);}
    @media(max-width:480px){.auth-card{padding:1.8rem 1.5rem;}}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <a href="/">
      <div class="logo-icon">CT</div>
      <div class="logo-text">COACH<span>AND</span>TRACK</div>
    </a>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">WELCOME <span>BACK</span></h1>
    <p class="auth-sub">Sign in to access your workouts and track your progress.</p>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        <div class="form-forgot"><a href="#" id="forgot-link">Forgot password?</a></div>
      </div>
      <button class="btn-submit" type="submit" id="submit-btn">Sign In →</button>
    </form>
    <div class="divider">or</div>
    <div class="auth-footer">Don't have an account? <a href="/signup.html">Create one →</a></div>
  </div>
  <div class="back-home"><a href="/">← Back to CoachAndTrack</a></div>
</div>
<script>
  const SUPABASE_URL = 'https://zmkhinakvsemoxglbwrf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpta2hpbmFrdnNlbW94Z2xid3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTM5NjUsImV4cCI6MjA5MjI4OTk2NX0.tw4J0QWOcOdTmRqC8rG7HIV1d4iAfkuny6MlK5RGKa4';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const form = document.getElementById('login-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');
  function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('show'); successMsg.classList.remove('show'); }
  function showSuccess(msg) { successMsg.textContent = msg; successMsg.classList.add('show'); errorMsg.classList.remove('show'); }
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      const redirect = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = redirect || '/dashboard.html';
    }
  });
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    submitBtn.disabled = true; submitBtn.textContent = 'Signing in...'; errorMsg.classList.remove('show');
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) {
      showError(error.message === 'Invalid login credentials' ? 'Incorrect email or password. Please try again.' : error.message);
      submitBtn.disabled = false; submitBtn.textContent = 'Sign In →'; return;
    }
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    window.location.href = redirect || '/dashboard.html';
  });
  document.getElementById('forgot-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Please enter your email address first.'); return; }
    const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo: 'https://coachandtrack.com/reset-password.html' });
    if (error) { showError(error.message); } else { showSuccess('Password reset email sent! Check your inbox.'); }
  });
</script>
</body>
</html>
