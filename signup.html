<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — CoachAndTrack</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--dark:#0D0D14;--card:#13131E;--elevated:#1A1A2E;--border:#2A2A3E;--orange:#F97316;--green:#22C55E;--text:#F3F4F6;--muted:#94A3B8;--dim:#64748B;--red:#EF4444;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(249,115,22,0.08),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(249,115,22,0.04),transparent);pointer-events:none;}
    .auth-wrap{width:100%;max-width:460px;position:relative;z-index:1;}
    .auth-logo{text-align:center;margin-bottom:2rem;}
    .auth-logo a{display:inline-flex;align-items:center;gap:0.6rem;text-decoration:none;}
    .logo-icon{width:40px;height:40px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:white;}
    .logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;color:var(--text);}
    .logo-text span{color:var(--orange);}
    .auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
    .auth-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:0.4rem;line-height:1;}
    .auth-title span{color:var(--orange);}
    .auth-sub{font-size:0.88rem;color:var(--muted);margin-bottom:2rem;line-height:1.6;}
    .form-group{margin-bottom:1.2rem;}
    .form-label{display:block;font-size:0.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;}
    .form-input{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;transition:border-color 0.2s;outline:none;}
    .form-input:focus{border-color:var(--orange);}
    .form-input::placeholder{color:var(--dim);}
    .coach-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-top:0.5rem;}
    .coach-option{position:relative;}
    .coach-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
    .coach-card{display:flex;flex-direction:column;align-items:center;gap:0.4rem;background:var(--elevated);border:2px solid var(--border);border-radius:12px;padding:1rem 0.75rem;cursor:pointer;transition:all 0.2s;text-align:center;}
    .coach-option input:checked+.coach-card{border-color:var(--orange);background:rgba(249,115,22,0.08);}
    .coach-card:hover{border-color:var(--orange);}
    .coach-avatar{width:36px;height:36px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.75rem;color:white;}
    .coach-name{font-size:0.8rem;font-weight:700;color:var(--text);}
    .coach-specialty{font-size:0.68rem;color:var(--muted);line-height:1.3;}
    .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.5rem;}
    .plan-option{position:relative;}
    .plan-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
    .plan-card{display:flex;flex-direction:column;gap:0.25rem;background:var(--elevated);border:2px solid var(--border);border-radius:12px;padding:1rem;cursor:pointer;transition:all 0.2s;}
    .plan-option input:checked+.plan-card{border-color:var(--orange);background:rgba(249,115,22,0.08);}
    .plan-card:hover{border-color:var(--orange);}
    .plan-name{font-weight:700;font-size:0.9rem;color:var(--text);}
    .plan-price{font-size:0.78rem;color:var(--orange);font-weight:700;}
    .plan-desc{font-size:0.72rem;color:var(--muted);line-height:1.4;}
    .error-msg{display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;color:#FCA5A5;margin-bottom:1.2rem;}
    .error-msg.show{display:block;}
    .btn-submit{width:100%;background:var(--orange);color:white;border:none;border-radius:10px;padding:0.95rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-bottom:1.5rem;margin-top:0.5rem;}
    .btn-submit:hover{opacity:0.9;}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
    .terms-note{font-size:0.75rem;color:var(--dim);text-align:center;margin-bottom:1.5rem;line-height:1.6;}
    .terms-note a{color:var(--dim);text-decoration:underline;}
    .divider{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;color:var(--dim);font-size:0.8rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .auth-footer{text-align:center;font-size:0.88rem;color:var(--muted);}
    .auth-footer a{color:var(--orange);text-decoration:none;font-weight:600;}
    .back-home{text-align:center;margin-top:1.5rem;}
    .back-home a{font-size:0.82rem;color:var(--dim);text-decoration:none;transition:color 0.2s;}
    .back-home a:hover{color:var(--orange);}
    @media(max-width:480px){.auth-card{padding:1.8rem 1.5rem;}.coach-grid{grid-template-columns:1fr;}.plan-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <a href="/"><div class="logo-icon">CT</div><div class="logo-text">COACH<span>AND</span>TRACK</div></a>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">START <span>TRAINING</span></h1>
    <p class="auth-sub">Create your account and choose your coach. Day 1 is free — no credit card needed.</p>
    <div class="error-msg" id="error-msg"></div>
    <form id="signup-form">
      <div class="form-group">
        <label class="form-label" for="fullname">Full Name</label>
        <input class="form-input" type="text" id="fullname" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label class="form-label">Choose Your Coach</label>
        <div class="coach-grid">
          <label class="coach-option">
            <input type="radio" name="coach" value="ce94a34f-4920-4330-a13c-bc49818debe6" required />
            <div class="coach-card"><div class="coach-avatar">VM</div><div class="coach-name">Veronica M.</div><div class="coach-specialty">Strength &amp; Nutrition</div></div>
          </label>
          <label class="coach-option">
            <input type="radio" name="coach" value="490c8e34-7d46-43cd-9d11-93e0d627d1f8" />
            <div class="coach-card"><div class="coach-avatar">RC</div><div class="coach-name">Rolando C.</div><div class="coach-specialty">Strength &amp; Performance</div></div>
          </label>
          <label class="coach-option">
            <input type="radio" name="coach" value="e953bd08-e1bf-4185-8547-2706dbd8d2e9" />
            <div class="coach-card"><div class="coach-avatar">ES</div><div class="coach-name">Eliana S.</div><div class="coach-specialty">Core &amp; Hypopressive</div></div>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Choose Your Plan</label>
        <div class="plan-grid">
          <label class="plan-option">
            <input type="radio" name="plan" value="free" checked />
            <div class="plan-card"><div class="plan-name">Starter</div><div class="plan-price">Free</div><div class="plan-desc">Day 1 free · Browse coaches</div></div>
          </label>
          <label class="plan-option">
            <input type="radio" name="plan" value="pro" />
            <div class="plan-card"><div class="plan-name">Pro</div><div class="plan-price">$14 / month</div><div class="plan-desc">Full access · All programs</div></div>
          </label>
        </div>
      </div>
      <div class="terms-note">By creating an account you agree to our <a href="/terms-of-service.html">Terms of Service</a> and <a href="/privacy-policy.html">Privacy Policy</a>.</div>
      <button class="btn-submit" type="submit" id="submit-btn">Create Account →</button>
    </form>
    <div class="divider">already a member?</div>
    <div class="auth-footer"><a href="/login.html">Sign in to your account →</a></div>
  </div>
  <div class="back-home"><a href="/">← Back to CoachAndTrack</a></div>
</div>
<script>
  const SUPABASE_URL = 'https://zmkhinakvsemoxglbwrf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpta2hpbmFrdnNlbW94Z2xid3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTM5NjUsImV4cCI6MjA5MjI4OTk2NX0.tw4J0QWOcOdTmRqC8rG7HIV1d4iAfkuny6MlK5RGKa4';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const form = document.getElementById('signup-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('show'); }
  db.auth.getSession().then(({ data: { session } }) => { if (session) window.location.href = '/dashboard.html'; });
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const coachId = document.querySelector('input[name=coach]:checked')?.value;
    const plan = document.querySelector('input[name=plan]:checked')?.value || 'free';
    if (!coachId) { showError('Please choose your coach to continue.'); return; }
    submitBtn.disabled = true; submitBtn.textContent = 'Creating account...'; errorMsg.classList.remove('show');
    const { data: authData, error: authError } = await db.auth.signUp({ email, password, options: { data: { full_name: fullname } } });
    if (authError) { showError(authError.message); submitBtn.disabled = false; submitBtn.textContent = 'Create Account →'; return; }
    if (authData.user) {
      await db.from('members').insert({ id: authData.user.id, email, full_name: fullname, plan, coach_id: coachId, active: true });
    }
    if (plan === 'pro') { window.location.href = 'https://buy.stripe.com/fZu4gz6ji8fj0wXfHmcEw01'; return; }
    window.location.href = '/dashboard.html?welcome=1';
  });
</script>
</body>
</html>
